# Netlify configuration for deploying the frontend Next.js app
# Builds the site from the `frontend` directory and uses the official
# Netlify Next.js plugin to enable SSR/ISR and image/function support.

[build]
  # base directory where Netlify will run `npm install` and build
  base = "frontend"
  # build command
  command = "npm run build"
  # publish directory produced by Next.js (plugin-aware)
  publish = "frontend/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Optional: environment variables can be configured in Netlify UI. Example:
# [build.environment]
#   NEXT_PUBLIC_API_URL = "https://api.example.com/api"
